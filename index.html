<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
    <div class="header">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="fb">
        </div>
        <h1>facebook</h1>
    </div>

    <div class="login-container">
        <form>
            <input type="text" placeholder="Email or phone number" class="input-field">
            <input type="password" placeholder="Password" class="input-field">
            <button type="submit" class="login-btn">Log In</button>
        </form>

        <a href="#" class="forgot-password">Forgotten password?</a>

        <div class="divider"></div>

        <button class="create-btn">Create new Facebook account</button>
    </div>

    <footer class="footer">
        <p class="meta-text">Meta</p>
    </footer>
</div>

</body>
</html>
