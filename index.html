<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <p class="language">English (UK)</p>

    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="fb">
    </div>

    <form>
        <input type="text" placeholder="Mobile number or email address">
        <input type="password" placeholder="Password">
        <button type="submit">Log in</button>
    </form>

    <a href="#" class="forgot">Forgotten password?</a>

    <button class="create">Create new account</button>

    <p class="meta">Meta</p>

</div>

</body>
</html>
